<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFC STYLE | KIRILL MEGA MENU</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --kfc-red: #e4002b;
    --dark: #000;
    --white: #fff;
    --gray: #222;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--dark);
    color: var(--white);
    margin: 0;
}

.header-top {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 20px;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: space-between;
    border-bottom: 2px solid var(--kfc-red);
    z-index: 1000;
}

.balance-badge {
    background: var(--kfc-red);
    padding: 8px 15px;
    font-weight: 800;
}

.hero-banner {
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), black),
    url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=1200&q=80');
    background-size: cover;
    height: 25vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 60px;
}

.hero-banner h1 {
    font-family: 'Oswald';
    font-size: 40px;
    text-shadow: 3px 3px var(--kfc-red);
}

.tabs-container {
    display: flex;
    gap: 10px;
    padding: 20px;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    background: var(--gray);
    color: white;
    border: none;
    cursor: pointer;
}

.tab-btn.active {
    background: var(--kfc-red);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
    padding: 10px;
}

.food-card {
    background: #111;
    border-left: 6px solid var(--kfc-red);
    overflow: hidden;
    transform: translateY(30px);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
}

.food-card:nth-child(2){animation-delay:.1s}
.food-card:nth-child(3){animation-delay:.2s}
.food-card:nth-child(4){animation-delay:.3s}
.food-card:nth-child(5){animation-delay:.4s}
.food-card:nth-child(6){animation-delay:.5s}

@keyframes fadeUp {
    to { transform: translateY(0); opacity: 1; }
}

.food-card:hover {
    transform: scale(1.03);
}

.food-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    transition: .4s;
}

.food-card:hover .food-img {
    transform: scale(1.1);
}

.food-info { padding: 15px; }

.food-title {
    font-family: 'Oswald';
    font-size: 20px;
}

.food-price {
    color: var(--kfc-red);
    font-weight: 800;
}

.buy-btn {
    width: 100%;
    padding: 12px;
    background: var(--kfc-red);
    border: none;
    cursor: pointer;
    transition: .3s;
}

.buy-btn:hover {
    background: #ff1a4d;
    transform: scale(1.05);
}

.menu-page { display: none; }
.menu-page.active { display: block; }

#notify {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translate(-50%,50px);
    opacity: 0;
    background: white;
    color: black;
    padding: 15px 30px;
    transition: .4s;
}

#notify.show {
    transform: translate(-50%,0);
    opacity: 1;
}

.footer-svinota {
    background: var(--kfc-red);
    text-align: center;
    padding: 20px;
    font-family: 'Oswald';
    font-size: 30px;
}
</style>
</head>

<body>

<div class="header-top">
    <div>FOOD DASH PRO</div>
    <div class="balance-badge">БАЛАНС: <span id="bal">5000</span>$</div>
</div>

<div class="hero-banner">
    <h1>Меню для Кирилла</h1>
</div>

<div class="tabs-container">
    <button class="tab-btn active" onclick="openTab('food',this)">ЕДА</button>
    <button class="tab-btn" onclick="openTab('drinks',this)">АЛКОГОЛЬ</button>
</div>

<div id="food" class="menu-page active">
<div class="grid">

<div class="food-card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">ПИЦЦА ПЕППЕРОНИ 🍕</div>
<div class="food-price">650 ₽</div>
<button class="buy-btn" onclick="order('ПИЦЦА',650)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">ШЕФБУРГЕР 🍔</div>
<div class="food-price">450 ₽</div>
<button class="buy-btn" onclick="order('ШЕФБУРГЕР',450)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1541214113241-21578d2d9b62?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">ХОТ-ДОГ 🌭</div>
<div class="food-price">190 ₽</div>
<button class="buy-btn" onclick="order('ХОТ-ДОГ',190)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">КАРТОФЕЛЬ ФРИ 🍟</div>
<div class="food-price">199 ₽</div>
<button class="buy-btn" onclick="order('ФРИ',199)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1527477396000-e27163b481c2?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">КРЫЛЬЯ 🍗</div>
<div class="food-price">399 ₽</div>
<button class="buy-btn" onclick="order('КРЫЛЬЯ',399)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">МОРОЖЕНОЕ 🍦</div>
<div class="food-price">120 ₽</div>
<button class="buy-btn" onclick="order('МОРОЖЕНОЕ',120)">ВЗЯТЬ</button>
</div>
</div>

</div>
</div>

<div id="drinks" class="menu-page">
<div class="grid">

<div class="food-card">
<img src="https://images.unsplash.com/photo-1608270586620-248524c67de9?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">ПИВО 🍺</div>
<div class="food-price">344 ₽</div>
<button class="buy-btn" onclick="order('ПИВО',344)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1510627498534-cf7e9002facc?w=600&q=90" class="food-img">
<div class="food-info">
<div class="food-title">ВИНО 🍷</div>
<div class="food-price">180 ₽</div>
<button class="buy-btn" onclick="order('ВИНО',180)">ВЗЯТЬ</button>
</div>
</div>

</div>
</div>

<footer class="footer-svinota">KIRILL SVINOTA</footer>
<div id="notify">ЗАКАЗ ПРИНЯТ 🚀</div>

<script>
let money = 5000;

function openTab(id,btn){
document.querySelectorAll('.menu-page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
btn.classList.add('active');
}

function order(name,price){
if(money<price){alert("НЕТ ДЕНЕГ");return;}
money-=price;
document.getElementById('bal').innerText=money;

let n=document.getElementById('notify');
n.classList.add('show');
setTimeout(()=>n.classList.remove('show'),2000);
}
</script>

</body>
</html>
