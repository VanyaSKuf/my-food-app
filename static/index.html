<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KFC STYLE | KIRILL EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --kfc-red: #e4002b;
            --dark: #000000;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: var(--white);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Полный экран и жирный заголовок */
        .hero-banner {
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--dark)), 
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1200&q=80');
            background-size: cover;
            background-position: center;
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--kfc-red);
        }

        .hero-banner h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 50px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px var(--kfc-red);
        }

        .header-top {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
        }

        .balance-badge {
            background: var(--kfc-red);
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: 800;
            font-family: 'Oswald', sans-serif;
        }

        /* Сетка на весь экран */
        .menu-container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .hero-banner h1 { font-size: 35px; }
        }

        /* Огромные сочные карточки */
        .food-card {
            background: #111;
            border-radius: 0px; /* Острые углы как в KFC */
            overflow: hidden;
            border-left: 8px solid var(--kfc-red);
            transition: 0.3s;
            position: relative;
        }

        .food-img {
            width: 100%;
            height: 300px; /* Очень большие картинки */
            object-fit: cover;
            filter: contrast(1.1) brightness(0.9);
        }

        .food-info {
            padding: 20px;
        }

        .food-title {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .food-price {
            font-size: 24px;
            font-weight: 800;
            color: var(--kfc-red);
            margin-bottom: 20px;
        }

        .buy-btn {
            background: var(--kfc-red);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .buy-btn:hover { background: #b30022; }

        /* История заказов */
        .orders-box {
            background: #000;
            padding: 20px;
            border: 2px dashed var(--kfc-red);
            margin: 20px 0;
        }

        /* ТВОЯ НАДПИСЬ */
        .footer-svinota {
            background: var(--kfc-red);
            color: black;
            text-align: center;
            padding: 20px;
            font-family: 'Oswald', sans-serif;
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 15px;
            margin-top: auto;
        }

        #notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 15px 40px;
            font-weight: bold;
            text-transform: uppercase;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="header-top">
        <div style="font-family: 'Oswald'; font-size: 24px;">FOOD DASH PRO</div>
        <div class="balance-badge">КОШЕЛЕК: <span id="bal">5000</span> ₽</div>
    </div>

    <div class="hero-banner">
        <h1>Вы проголодались, Кирилл?</h1>
        <p style="text-transform: uppercase; letter-spacing: 3px;">Только самое мощное мясо</p>
    </div>

    <div class="menu-container">
        <div class="grid">
            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=800&q=80" class="food-img">
                <div class="food-info">
                    <div class="food-title">МЕГА ШЕФБУРГЕР</div>
                    <div class="food-price">450 ₽</div>
                    <button class="buy-btn" onclick="order('МЕГА ШЕФБУРГЕР 🍔', 450)">ВЗЯТЬ ЭТО</button>
                </div>
            </div>

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=800&q=80" class="food-img">
                <div class="food-info">
                    <div class="food-title">БАСКЕТ ДУЭТ</div>
                    <div class="food-price">999 ₽</div>
                    <button class="buy-btn" onclick="order('БАСКЕТ ДУЭТ 🍗', 999)">ВЗЯТЬ ЭТО</button>
                </div>
            </div>

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1562967914-608f82629710?w=800&q=80" class="food-img">
                <div class="food-info">
                    <div class="food-title">ОСТРЫЕ БАЙТСЫ</div>
                    <div class="food-price">299 ₽</div>
                    <button class="buy-btn" onclick="order('БАЙТСЫ 🔥', 299)">ВЗЯТЬ ЭТО</button>
                </div>
            </div>
        </div>

        <div class="orders-box">
            <h2 style="font-family: 'Oswald';">ВАШИ ЧЕКИ:</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <footer class="footer-svinota">
        KIRILL SVINOTA
    </footer>

    <div id="notify">ЗАКАЗ ПОДТВЕРЖДЕН! 🚀</div>

    <script>
        let money = 5000;

        async function order(name, cost) {
            if (money < cost) {
                alert("ДЕНЕГ НЕТ!");
                return;
            }

            const res = await fetch('/orders', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({item: name})
            });

            if (res.ok) {
                money -= cost;
                document.getElementById('bal').innerText = money;
                const n = document.getElementById('notify');
                n.style.display = 'block';
                setTimeout(() => n.style.display = 'none', 2000);
                updateList();
            }
        }

        async function updateList() {
            const r = await fetch('/orders');
            const data = await r.json();
            const l = document.getElementById('orders-list');
            l.innerHTML = data.reverse().map(o => `
                <div style="padding: 10px; border-bottom: 1px solid #333;">
                    <b>${o.item}</b> — <span style="color: #2ed573">ГОТОВИТСЯ</span>
                </div>
            `).join('');
        }

        updateList();
    </script>
</body>
</html>
