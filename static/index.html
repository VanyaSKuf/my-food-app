<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Food App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Comprehensive CSS Animations */
        body {
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .card {
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: scale(1.05);
        }
        button {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        button:hover {
            background-color: #ffcc00;
            color: #333;
        }
        header, .hero-banner {
            animation: fadeIn 1s ease-in;
        }
        .tabs, .order-items {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Food App</h1>
    </header>
    <div class="hero-banner">
        <img src="https://example.com/path-to-ice-cream-image.jpg" alt="Ice Cream">
    </div>
    <div class="tabs">
        <img src="https://example.com/path-to-beer-image.jpg" alt="Beer">
        <img src="https://example.com/path-to-wine-image.jpg" alt="Wine">
    </div>
    <div class="order-items">
        <!-- Order items will go here -->
    </div>
    <script src="script.js"></script>
</body>
</html>
