<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Food App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CSS keyframe animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.7); }
            100% { text-shadow: 0 0 20px rgba(255, 255, 255, 1); }
        }
        
        /* Applying animation to elements */
        body {
            animation: fadeIn 1s ease-in;
            transition: all 0.5s ease;
        }
        
        .menu-item {
            animation: slideIn 0.5s forwards;
            transition: transform 0.3s;
        }
        
        .menu-item:hover {
            transform: scale(1.05);
            animation: pulse 0.5s;
        }
        
        .highlight {
            animation: glow 1s infinite alternate;
        }
    </style>
</head>
<body>
    <h1 class="highlight">Welcome to My Food App!</h1>
    <div class="menu">
        <div class="menu-item">
            <h2>Ice Cream</h2>
            <img src="https://images.unsplash.com/photo-1470521598063-ccdb3e54d157" alt="Ice Cream">
        </div>
        <div class="menu-item">
            <h2>Beer</h2>
            <img src="https://images.unsplash.com/photo-1608046813714-7d3e8af3c6e0" alt="Beer">
        </div>
        <div class="menu-item">
            <h2>Wine</h2>
            <img src="https://images.unsplash.com/photo-1510812431401-41d2cab2707d" alt="Wine">
        </div>
    </div>
</body>
</html>
