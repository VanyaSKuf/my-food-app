<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOOD DASH | Сочный Фастфуд</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #ffa502;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Шапка */
        .header {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-card {
            background: var(--card);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            font-weight: bold;
            font-size: 14px;
        }

        /* Контент */
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            box-sizing: border-box;
            padding: 20px;
            flex: 1;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text h1 { font-size: 28px; margin-bottom: 5px; }
        .welcome-text p { color: #94a3b8; font-size: 16px; }

        /* Сетка товаров */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .food-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 15px;
        }

        .card-badge {
            position: absolute;
            top: 30px;
            right: 30px;
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        .card-desc { font-size: 14px; color: #94a3b8; margin-bottom: 15px; min-height: 40px; }
        .card-price { color: var(--accent); font-size: 20px; font-weight: bold; margin-bottom: 15px; }

        .btn-buy {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn-buy:active { transform: scale(0.95); }

        /* История заказов */
        .orders-section {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Футер */
        .footer-brand {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0,0,0,0.2);
        }

        .svinota-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 8px;
            color: rgba(255,255,255,0.1);
            text-transform: uppercase;
        }

        /* Уведомление */
        #notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            background: #2ed573;
            color: black;
            font-weight: bold;
            border-radius: 50px;
            display: none;
            z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .welcome-text h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FOOD DASH PRO</div>
        <div class="balance-card"><span id="balance">5000</span> ₽</div>
    </div>

    <div class="container">
        <div class="welcome-text">
            <h1>Вы проголодались, Кирилл?</h1>
            <p>Огромный и сочный фастфуд специально для тебя</p>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-badge">HOT 🔥</div>
                <img src="https://images.unsplash.com/photo-1562967914-608f82629710?w=500&q=80" class="food-img">
                <div class="card-title">Ост
