<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFC STYLE | KIRILL MEGA MENU</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --kfc-red: #e4002b;
    --dark: #0a0a0a;
    --card: #141414;
    --white: #fff;
    --gray: #2a2a2a;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--dark);
    color: var(--white);
    margin: 0;
}

.header-top {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 20px;
    background: rgba(0,0,0,0.95);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.balance-badge {
    background: var(--kfc-red);
    padding: 8px 15px;
    border-radius: 8px;
    font-weight: 800;
}

.hero-banner {
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), black),
    url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&q=80');
    background-size: cover;
    height: 25vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 70px;
}

.hero-banner h1 {
    font-family: 'Oswald';
    font-size: 36px;
}

.tabs-container {
    display: flex;
    gap: 10px;
    padding: 15px;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    background: var(--gray);
    border-radius: 8px;
    border: none;
    color: white;
}

.tab-btn.active { background: var(--kfc-red); }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
    padding: 15px;
}

.food-card {
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
}

.food-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.food-info { padding: 15px; }

.food-title {
    font-family: 'Oswald';
    font-size: 18px;
}

.food-price {
    color: var(--kfc-red);
    font-weight: 800;
}

.buy-btn {
    width: 100%;
    padding: 12px;
    background: var(--kfc-red);
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.menu-page { display: none; }
.menu-page.active { display: block; }

#notify {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translate(-50%,50px);
    opacity: 0;
    background: white;
    color: black;
    padding: 12px 25px;
    border-radius: 10px;
    transition: .4s;
}

#notify.show {
    transform: translate(-50%,0);
    opacity: 1;
}

.footer-svinota {
    background: var(--kfc-red);
    text-align: center;
    padding: 20px;
    font-family: 'Oswald';
    font-size: 28px;
}
</style>
</head>

<body>

<div class="header-top">
    <div>FOOD DASH PRO</div>
    <div class="balance-badge">💰 <span id="bal">5000</span></div>
</div>

<div class="hero-banner">
    <h1>Проголодался Кирилл?</h1>
</div>

<div class="tabs-container">
    <button class="tab-btn active" onclick="openTab('food',this)">ЕДА</button>
    <button class="tab-btn" onclick="openTab('drinks',this)">АЛКОГОЛЬ</button>
</div>

<!-- FOOD -->
<div id="food" class="menu-page active">
<div class="grid">

<div class="food-card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" class="food-img">
<div class="food-info">
<div class="food-title">ПИЦЦА 🍕</div>
<div class="food-price">650 ₽</div>
<button class="buy-btn" onclick="order('ПИЦЦА',650)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=800" class="food-img">
<div class="food-info">
<div class="food-title">ШЕФБУРГЕР 🍔</div>
<div class="food-price">450 ₽</div>
<button class="buy-btn" onclick="order('БУРГЕР',450)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=800" class="food-img">
<div class="food-info">
<div class="food-title">МОРОЖЕНОЕ 🍦</div>
<div class="food-price">120 ₽</div>
<button class="buy-btn" onclick="order('МОРОЖЕНОЕ',120)">ВЗЯТЬ</button>
</div>
</div>

</div>
</div>

<!-- DRINKS -->
<div id="drinks" class="menu-page">
<div class="grid">

<div class="food-card">
<img src="https://images.unsplash.com/photo-1608270586620-248524c67de9?w=800" class="food-img">
<div class="food-info">
<div class="food-title">ПИВО 🍺</div>
<div class="food-price">344 ₽</div>
<button class="buy-btn" onclick="order('ПИВО',344)">ВЗЯТЬ</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=800" class="food-img">
<div class="food-info">
<div class="food-title">ВИНО 🍷</div>
<div class="food-price">180 ₽</div>
<button class="buy-btn" onclick="order('ВИНО',180)">ВЗЯТЬ</button>
</div>
</div>

</div>
</div>

<footer class="footer-svinota">KIRILL SVINOTA</footer>
<div id="notify">ЗАКАЗ ПРИНЯТ 🚀</div>

<script>
let money = 5000;

function openTab(id,btn){
document.querySelectorAll('.menu-page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
btn.classList.add('active');
}

function order(name,price){
if(money<price){alert("НЕТ ДЕНЕГ");return;}
money-=price;
document.getElementById('bal').innerText=money;

let n=document.getElementById('notify');
n.classList.add('show');
setTimeout(()=>n.classList.remove('show'),2000);
}
</script>

</body>
</html>
